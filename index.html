<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MyDashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getDatabase, ref, set, get, push, remove, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCshrE6SOWBIT2UgfpOR_TIQYXNQBZvLl8",
  authDomain: "dash-ca315.firebaseapp.com",
  projectId: "dash-ca315",
  storageBucket: "dash-ca315.firebasestorage.app",
  messagingSenderId: "431723990100",
  appId: "1:431723990100:web:964351aa40a2f2e38131c1",
  databaseURL: "https://dash-ca315-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();
let currentUser = null;

// ★ FIX: เปิดเผย _fb ทันทีหลัง module โหลด (ก่อน onAuthStateChanged)
window._fb = {
  loginGoogle: async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { window.showToast && showToast('Login ไม่สำเร็จ: ' + e.message, 'error'); }
  },
  logout: async () => { await signOut(auth); },
  setData: async (path, data) => {
    if (!currentUser) return;
    await set(ref(db, `users/${currentUser.uid}/${path}`), data);
  },
  getData: async (path) => {
    if (!currentUser) return null;
    const snap = await get(ref(db, `users/${currentUser.uid}/${path}`));
    return snap.exists() ? snap.val() : null;
  },
  pushData: async (path, data) => {
    if (!currentUser) return null;
    const r = await push(ref(db, `users/${currentUser.uid}/${path}`), data);
    return r.key;
  },
  removeData: async (path) => {
    if (!currentUser) return;
    await remove(ref(db, `users/${currentUser.uid}/${path}`));
  },
  listen: (path, cb) => {
    if (!currentUser) return () => {};
    return onValue(ref(db, `users/${currentUser.uid}/${path}`), snap => {
      cb(snap.exists() ? snap.val() : null);
    });
  }
};

// ★ FIX: รอ DOM พร้อมแล้วค่อย bind login button
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.querySelector('.btn-google');
  if (btn) btn.onclick = () => window._fb.loginGoogle();
});

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-shell').style.display = 'flex';
    const av = document.getElementById('user-avatar');
    const nm = document.getElementById('user-name');
    if (av) av.src = user.photoURL || '';
    if (nm) nm.textContent = user.displayName || user.email;
    if (window._appReady) window._appReady(user);
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-shell').style.display = 'none';
  }
});
</script>

<style>
  @font-face { font-family:'TH Sarabun New'; src:local('TH Sarabun New'),local('THSarabunNew'); }
  :root {
    --bg:#07090f;
    --surface:#0f1624;
    --surface2:#162035;
    --surface3:#1e2d45;
    --border:#1e3356;
    --border2:#2a4a78;
    --accent:#4f8ef7;
    --accent2:#22d3a0;
    --accent3:#f6a623;
    --accent4:#f25f5c;
    --text:#eef2ff;
    --text2:#7b9cc4;
    --text3:#3a5378;
    --strava:#fc4c02;
    --glow: 0 0 20px rgba(79,142,247,.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:10px;}

  /* LOGIN */
  #login-screen{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--bg);z-index:999;
    background-image:
      radial-gradient(ellipse 60% 50% at 15% 50%, rgba(79,142,247,.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 85% 20%, rgba(34,211,160,.05) 0%, transparent 60%);
  }
  .login-box{text-align:center;padding:52px 48px;background:var(--surface);border:1px solid var(--border2);border-radius:24px;width:420px;box-shadow:0 32px 64px rgba(0,0,0,.6), var(--glow);}
  .login-logo{font-family:'Space Mono',monospace;font-size:36px;font-weight:700;color:var(--accent);letter-spacing:-1px;margin-bottom:6px;text-shadow:0 0 30px rgba(79,142,247,.4);}
  .login-sub{color:var(--text2);font-size:14px;margin-bottom:36px;line-height:1.8;}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:15px;border-radius:14px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:'Sarabun',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all .25s;}
  .btn-google:hover{background:var(--surface3);border-color:var(--accent);box-shadow:var(--glow);transform:translateY(-2px);}
  .login-note{margin-top:20px;font-size:12px;color:var(--text3);line-height:1.7;}
  .login-warn{margin-top:14px;font-size:11px;color:var(--accent3);background:rgba(246,166,35,.07);border:1px solid rgba(246,166,35,.2);border-radius:10px;padding:12px;line-height:1.7;}

  /* APP SHELL */
  #app-shell{display:none;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
  .logo-area{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .logo-text{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);}
  .logo-text span{color:var(--text3);font-size:10px;display:block;font-weight:400;margin-top:2px;letter-spacing:.5px;}
  .nav{flex:1;padding:10px 0;}
  .nav-section{padding:14px 20px 5px;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;font-weight:700;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13.5px;border-left:2px solid transparent;transition:all .18s;border-radius:0 8px 8px 0;margin:1px 8px 1px 0;}
  .nav-item:hover{color:var(--text);background:var(--surface2);border-left-color:var(--border2);}
  .nav-item.active{color:var(--accent);background:rgba(79,142,247,.08);border-left-color:var(--accent);font-weight:600;}
  .nav-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
  .user-area{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .user-avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;}
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .user-sub{font-size:10px;color:var(--text3);margin-top:1px;}
  .btn-logout{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px;transition:color .2s;}
  .btn-logout:hover{color:var(--accent4);}

  /* MAIN */
  .main{margin-left:248px;padding:28px 32px;min-height:100vh;flex:1;}
  .page{display:none;animation:fadeIn .22s ease;}
  .page.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(7px);}to{opacity:1;transform:translateY(0);}}
  h1{font-size:23px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px;}
  .subtitle{color:var(--text2);font-size:13px;margin-bottom:22px;}

  /* GRID & CARDS */
  .grid{display:grid;gap:16px;}
  .grid-2{grid-template-columns:1fr 1fr;}
  .grid-3{grid-template-columns:1fr 1fr 1fr;}
  .grid-4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .2s;}
  .card:hover{border-color:var(--border2);}
  .card-title{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;}
  .stat-num{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;color:var(--text);}
  .stat-unit{font-size:13px;color:var(--text2);margin-left:5px;}

  /* BUTTONS */
  .btn{padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover:not(:disabled){background:#3b7ee8;box-shadow:0 4px 16px rgba(79,142,247,.35);}
  .btn-success{background:var(--accent2);color:#000;}
  .btn-success:hover:not(:disabled){background:#1ab88d;}
  .btn-danger{background:var(--accent4);color:#fff;}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
  .btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--border2);}
  .btn-strava{background:var(--strava);color:#fff;}
  .btn-strava:hover:not(:disabled){background:#e04400;}
  .btn-sm{padding:6px 12px;font-size:13px;}
  .btn-xs{padding:4px 9px;font-size:12px;}

  /* FORM */
  .form-group{margin-bottom:13px;}
  label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 13px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:14px;transition:border-color .2s,background .2s;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--surface2);}
  textarea{resize:vertical;}
  select option{background:var(--surface2);}

  /* TABS */
  .tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);}
  .tab{padding:9px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);border-bottom:2px solid transparent;transition:all .18s;margin-bottom:-1px;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* TABLE */
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font-size:10px;color:var(--text3);padding:10px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.8px;font-weight:700;}
  td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:rgba(255,255,255,.012);}

  /* AI BOX */
  .ai-box{background:linear-gradient(135deg,rgba(79,142,247,.06),rgba(34,211,160,.03));border:1px solid rgba(79,142,247,.22);border-radius:14px;padding:20px;}
  .ai-result{background:var(--surface2);border:1px solid var(--border);padding:16px;border-radius:10px;margin-top:12px;line-height:1.85;font-size:14px;color:var(--text);}
  .ai-result:empty{display:none;}

  /* CHART */
  .chart-wrap{position:relative;height:220px;}

  /* DOC PREVIEW */
  .doc-preview-bg{background:#3a3d42;padding:16px;border-radius:14px;overflow:auto;max-height:900px;display:flex;justify-content:center;}
  .a4-sim{width:210mm;min-height:297mm;height:auto;margin:0 auto;padding:2.5cm 2cm 2cm 3cm;background:#fff;color:#000;box-shadow:0 4px 32px rgba(0,0,0,.6);font-family:'TH Sarabun New','Sarabun',serif;font-size:16pt;line-height:1.15;display:flex;flex-direction:column;box-sizing:border-box;}

  /* PDF DROP ZONE */
  .drop-zone{border:2px dashed var(--border2);border-radius:12px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(79,142,247,.02);}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(79,142,247,.06);}
  .drop-zone-icon{font-size:36px;margin-bottom:8px;}
  .drop-zone-title{font-weight:700;font-size:15px;margin-bottom:4px;}
  .drop-zone-sub{font-size:12px;color:var(--text2);}
  .file-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3);color:#93c5fd;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;margin-bottom:12px;}
  .file-chip button{background:none;border:none;color:#93c5fd;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;}

  /* STAT CARD ACCENT */
  .stat-card{position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:.6;}

  /* STATUS PILL */
  .status-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .status-pill.ok{background:rgba(34,211,160,.1);color:var(--accent2);border:1px solid rgba(34,211,160,.25);}
  .status-pill.warn{background:rgba(246,166,35,.1);color:var(--accent3);border:1px solid rgba(246,166,35,.25);}
  .status-pill.err{background:rgba(242,95,92,.1);color:var(--accent4);border:1px solid rgba(242,95,92,.25);}
  .status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;display:none;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.4);}
  .toast-success{background:var(--accent2);color:#000;}
  .toast-error{background:var(--accent4);color:#fff;}
  .toast-info{background:var(--accent);color:#fff;}
  @keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

  /* LOADING */
  .loading-overlay{display:none;position:fixed;inset:0;background:rgba(7,9,15,.82);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .loading-overlay.show{display:flex;}
  .spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{color:var(--text2);font-size:14px;}

  /* WORKOUT ITEM */
  .workout-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);transition:background .15s;}
  .workout-item:last-child{border-bottom:none;}
  .workout-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
  .workout-main{font-weight:700;font-size:14px;}
  .workout-sub{font-size:12px;color:var(--text2);margin-top:2px;}

  /* SPLITS TABLE */
  .splits-wrap{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
  .splits-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}

  /* ── STATS PAGE WEEK NAV ── */
  .week-nav{display:flex;align-items:center;gap:12px;}
  .week-nav-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;padding:6px 12px;font-size:13px;font-weight:700;transition:all .18s;}
  .week-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
  .week-nav-label{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent);min-width:180px;text-align:center;}

  /* ── COACH PLAN ── */
  .plan-day{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:8px;transition:border-color .2s;}
  .plan-day.done{border-color:var(--accent2);background:rgba(34,211,160,.05);}
  .plan-day.missed{border-color:var(--accent4);background:rgba(242,95,92,.04);}
  .plan-day.today-row{border-color:var(--accent);background:rgba(79,142,247,.06);}
  .plan-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .plan-day-date{font-size:12px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .plan-day-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
  .badge-done{background:rgba(34,211,160,.15);color:var(--accent2);}
  .badge-missed{background:rgba(242,95,92,.12);color:var(--accent4);}
  .badge-today{background:rgba(79,142,247,.15);color:var(--accent);}
  .badge-upcoming{background:rgba(123,156,196,.1);color:var(--text3);}
  .plan-day-desc{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
  .plan-day-target{font-size:12px;color:var(--text2);}
  .plan-day-actual{font-size:12px;color:var(--accent2);margin-top:4px;font-weight:600;}

  /* UTILS */
  .flex{display:flex;}.items-center{align-items:center;}.justify-between{justify-content:space-between;}
  .gap-8{gap:8px;}.gap-12{gap:12px;}.gap-16{gap:16px;}
  .mt-8{margin-top:8px;}.mt-12{margin-top:12px;}.mt-16{margin-top:16px;}.mt-20{margin-top:20px;}
  .mb-8{margin-bottom:8px;}.mb-12{margin-bottom:12px;}.mb-16{margin-bottom:16px;}.mb-20{margin-bottom:20px;}
  .text-sm{font-size:13px;}.text-xs{font-size:11px;}.text2{color:var(--text2);}.text-right{text-align:right;}
  .mono{font-family:'Space Mono',monospace;}.bold{font-weight:700;}

  @media(max-width:768px){
    .sidebar{
      position:fixed;left:0;right:0;bottom:0;top:auto;
      width:100%;height:auto;
      flex-direction:row;align-items:stretch;
      border-right:none;border-top:1px solid var(--border);
      z-index:200;overflow:visible;
      padding:0;
    }
    .logo-area,.nav-section,.user-area{display:none;}
    .nav{
      display:flex;flex-direction:row;
      width:100%;overflow-x:auto;
      padding:0;
      scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
    }
    .nav::-webkit-scrollbar{display:none;}
    .nav-item{
      flex:0 0 auto;
      flex-direction:column;
      align-items:center;justify-content:center;
      gap:2px;
      padding:7px 10px 6px;
      border-left:none;border-top:2px solid transparent;
      border-radius:0;margin:0;
      min-width:56px;
    }
    .nav-item span:last-child{
      display:block !important;
      font-size:9px;color:var(--text3);
      white-space:nowrap;
    }
    .nav-item.active{
      border-left:none;border-top-color:var(--accent);
      background:rgba(79,142,247,.07);
    }
    .nav-item.active span:last-child{color:var(--accent);}
    .nav-item .icon{font-size:20px;width:auto;}

    .main{
      margin-left:0 !important;
      padding:16px 14px;
      padding-bottom:80px;
      min-height:100vh;
    }
    .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
    h1{font-size:20px;}
    .stat-num{font-size:24px;}
    .doc-preview-bg,.a4-sim{display:none;}
    .card{padding:14px;}
    .btn{padding:8px 12px;font-size:13px;}
    .splits-wrap input{width:60px!important;}
    #strava-week-strip{grid-template-columns:1fr 1fr !important;}
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-msg">กำลังโหลด...</div>
</div>
<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MyDash</div>
    <div class="login-sub">ระบบส่วนตัว — ข้อมูลอยู่บน Cloud<br>เข้าถึงได้ทุกอุปกรณ์ทุกที่</div>
    <button class="btn-google">
      <svg width="20" height="20" viewBox="0 0 24 24">
