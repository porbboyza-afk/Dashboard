<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyDash</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getDatabase, ref, set, get, push, remove, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyCshrE6SOWBIT2UgfpOR_TIQYXNQBZvLl8",
  authDomain: "dash-ca315.firebaseapp.com",
  projectId: "dash-ca315",
  storageBucket: "dash-ca315.firebasestorage.app",
  messagingSenderId: "431723990100",
  appId: "1:431723990100:web:964351aa40a2f2e38131c1",
  databaseURL: "https://dash-ca315-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();
let currentUser = null;

window._fb = {
  loginGoogle: async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { if(window.showToast) showToast('Login ไม่สำเร็จ: ' + e.message, 'error'); }
  },
  logout: async () => { await signOut(auth); },
  setData: async (path, data) => { if (!currentUser) return; await set(ref(db, `users/${currentUser.uid}/${path}`), data); },
  getData: async (path) => { if (!currentUser) return null; const snap = await get(ref(db, `users/${currentUser.uid}/${path}`)); return snap.exists() ? snap.val() : null; },
  pushData: async (path, data) => { if (!currentUser) return null; const r = await push(ref(db, `users/${currentUser.uid}/${path}`), data); return r.key; },
  removeData: async (path) => { if (!currentUser) return; await remove(ref(db, `users/${currentUser.uid}/${path}`)); },
  listen: (path, cb) => { if (!currentUser) return () => {}; return onValue(ref(db, `users/${currentUser.uid}/${path}`), snap => { cb(snap.exists() ? snap.val() : null); }); }
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  const loginScreen = document.getElementById('login-screen');
  const appShell = document.getElementById('app-shell');
  if (user) {
    loginScreen.style.display = 'none';
    appShell.style.display = 'flex';
    const av = document.getElementById('user-avatar');
    const nm = document.getElementById('user-name');
    if (av) av.src = user.photoURL || '';
    if (nm) nm.textContent = user.displayName || user.email;
    const tryReady = (attempts) => {
      if (window._appReady) {
        window._appReady(user);
      } else if (attempts > 0) {
        setTimeout(() => tryReady(attempts - 1), 50);
      }
    };
    tryReady(40);
  } else {
    loginScreen.style.display = 'flex';
    appShell.style.display = 'none';
  }
});
</script>

<style>
:root {
  /* Light theme (default) */
  --bg: #F5F5F5;
  --bg2: #EBEBEB;
  --surface: #FFFFFF;
  --surface2: #F9F9F9;
  --border: rgba(0,0,0,.07);
  --border2: rgba(0,0,0,.12);

  --text: #1C1C1E;
  --text2: #6C6C70;
  --text3: #AEAEB2;
  --text-inv: #FFFFFF;

  /* Accent */
  --accent: #007AFF;
  --accent-light: rgba(0,122,255,.1);
  --accent-mid: rgba(0,122,255,.18);
  --green: #34C759;
  --green-light: rgba(52,199,89,.12);
  --red: #FF3B30;
  --red-light: rgba(255,59,48,.1);
  --orange: #FF9500;
  --orange-light: rgba(255,149,0,.12);
  --purple: #AF52DE;
  --teal: #5AC8FA;
  --strava: #FC4C02;

  /* Shadows */
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.05);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  --shadow-card: 0 2px 8px rgba(0,0,0,.06);

  /* Radius */
  --r-sm: 10px;
  --r: 14px;
  --r-lg: 20px;
  --r-xl: 26px;
  --r-full: 999px;

  /* Sidebar */
  --sidebar-w: 260px;
  --topbar-h: 60px;
}

[data-theme="dark"] {
  --bg: #000000;
  --bg2: #1C1C1E;
  --surface: #1C1C1E;
  --surface2: #2C2C2E;
  --border: rgba(255,255,255,.08);
  --border2: rgba(255,255,255,.15);
  --text: #FFFFFF;
  --text2: #8E8E93;
  --text3: #48484A;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
  --shadow: 0 4px 16px rgba(0,0,0,.3);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
  --shadow-card: 0 2px 8px rgba(0,0,0,.3);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }

body {
  font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background .25s, color .25s;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ══════════════════════════
   LOGIN
══════════════════════════ */
#login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 999;
}

.login-card {
  background: var(--surface);
  border-radius: var(--r-xl);
  padding: 48px 40px 40px;
  width: 400px; max-width: 92vw;
  box-shadow: var(--shadow-lg);
  text-align: center;
}

.login-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #007AFF, #5856D6);
  border-radius: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
  box-shadow: 0 8px 24px rgba(0,122,255,.3);
}

.login-title {
  font-size: 26px; font-weight: 800; letter-spacing: -.5px;
  margin-bottom: 4px;
}

.login-sub {
  font-size: 13px; color: var(--text2);
  margin-bottom: 32px;
}

.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 15px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--r); color: var(--text);
  font-family: 'Figtree', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.btn-google:hover { background: var(--bg); transform: translateY(-1px); box-shadow: var(--shadow); }

.login-note { margin-top: 16px; font-size: 11px; color: var(--text3); line-height: 1.6; }

/* ══════════════════════════
   APP SHELL
══════════════════════════ */
#app-shell { display: flex; min-height: 100vh; }

/* ══════════════════════════
   SIDEBAR
══════════════════════════ */
.sidebar {
  position: fixed; left:0; top:0; bottom:0;
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 200; overflow-y: auto; overflow-x: hidden;
}

.sidebar-top {
  padding: 28px 20px 20px;
}

.logo-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}

.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #007AFF, #5856D6);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(0,122,255,.25);
}

.logo-text { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
.logo-ver { font-size: 10px; color: var(--text3); font-weight: 500; letter-spacing: .5px; }

.nav-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--text3);
  padding: 12px 16px 6px; margin-top: 4px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; margin: 1px 8px;
  border-radius: var(--r-sm);
  cursor: pointer; color: var(--text2);
  font-size: 14px; font-weight: 500;
  transition: all .15s; position: relative;
}

.nav-item:hover { background: var(--bg); color: var(--text); }

.nav-item.active {
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 600;
}

.nav-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
  background: var(--bg2);
  transition: background .15s;
}

.nav-item.active .nav-icon { background: var(--accent-light); }

.nav-item span:not(.nav-icon) { flex: 1; }

.nav-badge {
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  min-width: 18px; height: 18px;
  border-radius: 9px; padding: 0 5px;
  display: flex; align-items: center; justify-content: center;
}

.sidebar-bottom {
  margin-top: auto;
  border-top: 1px solid var(--border);
  padding: 14px 12px;
}

.user-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 8px;
  border-radius: var(--r);
  transition: background .15s; cursor: pointer;
}
.user-row:hover { background: var(--bg); }

.user-av {
  width: 36px; height: 36px; border-radius: 50%;
  object-fit: cover; flex-shrink: 0;
  border: 2px solid var(--accent);
}

.user-av-placeholder {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent-light); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-status { font-size: 11px; color: var(--green); font-weight: 500; display: flex; align-items: center; gap: 4px; }
.user-status::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0; }

.btn-logout {
  background: none; border: none; color: var(--text3); cursor: pointer;
  font-size: 18px; padding: 6px; border-radius: 8px; transition: all .15s; line-height: 1;
}
.btn-logout:hover { color: var(--red); background: var(--red-light); }

/* ══════════════════════════
   MAIN
══════════════════════════ */
.main {
  margin-left: var(--sidebar-w);
  flex: 1; min-height: 100vh;
  padding: 36px 40px;
}

.page { display: none; }
.page.active {
  display: block;
  animation: fadein .2s ease;
}

@keyframes fadein {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════
   PAGE HEADER
══════════════════════════ */
.page-header { margin-bottom: 28px; }

.page-title {
  font-size: 30px; font-weight: 800; letter-spacing: -.5px;
  color: var(--text); line-height: 1.1; margin-bottom: 4px;
}

.page-subtitle { font-size: 13px; color: var(--text2); font-weight: 500; }

/* ══════════════════════════
   CARDS
══════════════════════════ */
.card {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 20px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  transition: box-shadow .2s;
}

.card:hover { box-shadow: var(--shadow); }

.card-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
}

/* Stat Cards */
.stat-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
}

.stat-label {
  font-size: 11px; font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
}

.stat-value {
  font-size: 36px; font-weight: 800; letter-spacing: -1px;
  line-height: 1; font-family: 'JetBrains Mono', monospace;
  color: var(--text);
}

.stat-unit { font-size: 14px; font-weight: 500; color: var(--text2); margin-left: 2px; }

.stat-icon-wrap {
  width: 40px; height: 40px;
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 14px;
}

/* Hero Stat (big) */
.hero-ring-card {
  background: var(--surface);
  border-radius: var(--r-xl);
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: flex; gap: 32px; align-items: center;
}

/* Activity Ring */
.activity-ring { position: relative; flex-shrink: 0; }
.activity-ring svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke-linecap: round; }
.ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1); }
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
}
.ring-num { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.ring-unit { font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: .5px; }

/* ══════════════════════════
   GRID
══════════════════════════ */
.grid { display: grid; gap: 16px; }
.g2 { grid-template-columns: 1fr 1fr; }
.g3 { grid-template-columns: 1fr 1fr 1fr; }
.g4 { grid-template-columns: repeat(4, 1fr); }

/* ══════════════════════════
   BUTTONS
══════════════════════════ */
.btn {
  padding: 11px 20px;
  border-radius: var(--r);
  border: none; cursor: pointer;
  font-family: 'Figtree', sans-serif;
  font-size: 14px; font-weight: 600;
  transition: all .18s cubic-bezier(.34,1.56,.64,1);
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(0,122,255,.25); }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,122,255,.35); }

.btn-green { background: var(--green); color: #fff; box-shadow: 0 4px 12px rgba(52,199,89,.25); }
.btn-green:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(52,199,89,.35); }

.btn-ghost {
  background: var(--surface2); color: var(--text2);
  border: 1.5px solid var(--border2);
}
.btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--border2); background: var(--bg); }

.btn-danger { background: var(--red-light); color: var(--red); border: 1.5px solid rgba(255,59,48,.2); }
.btn-danger:hover:not(:disabled) { background: rgba(255,59,48,.18); }

.btn-strava { background: var(--strava); color: #fff; }
.btn-strava:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(252,76,2,.3); }

.btn-sm { padding: 8px 14px; font-size: 12px; border-radius: var(--r-sm); }
.btn-xs { padding: 5px 10px; font-size: 11px; border-radius: 8px; }

/* ══════════════════════════
   FORMS
══════════════════════════ */
.form-group { margin-bottom: 14px; }

label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  color: var(--text2); margin-bottom: 6px;
}

input, select, textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 11px 14px;
  color: var(--text);
  font-family: 'Figtree', sans-serif;
  font-size: 14px; font-weight: 500;
  transition: border-color .15s, box-shadow .15s;
  outline: none;
  -webkit-appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
  background: var(--surface);
}

textarea { resize: vertical; min-height: 80px; }
select option { background: var(--surface); }

/* ══════════════════════════
   TABS
══════════════════════════ */
.seg-tabs {
  display: inline-flex;
  background: var(--bg2);
  border-radius: var(--r-sm);
  padding: 3px;
  margin-bottom: 24px;
  gap: 2px;
}

.seg-tab {
  padding: 7px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px; font-weight: 600;
  color: var(--text2);
  transition: all .15s;
  white-space: nowrap;
}

.seg-tab.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* ══════════════════════════
   TABLE
══════════════════════════ */
table { width: 100%; border-collapse: collapse; }

th {
  text-align: left; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}

td { padding: 13px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background .1s; }
tbody tr:hover td { background: var(--bg); }

/* ══════════════════════════
   PILLS / BADGES
══════════════════════════ */
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: var(--r-full);
  font-size: 11px; font-weight: 700; letter-spacing: .3px;
}

.pill-green { background: var(--green-light); color: var(--green); }
.pill-red { background: var(--red-light); color: var(--red); }
.pill-blue { background: var(--accent-light); color: var(--accent); }
.pill-orange { background: var(--orange-light); color: var(--orange); }

.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ══════════════════════════
   TAG
══════════════════════════ */
.tag {
  display: inline-block; padding: 3px 9px; border-radius: 6px;
  font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
}
.tag-blue { background: var(--accent-light); color: var(--accent); }
.tag-green { background: var(--green-light); color: var(--green); }
.tag-orange { background: var(--orange-light); color: var(--orange); }
.tag-red { background: var(--red-light); color: var(--red); }

/* ══════════════════════════
   WORKOUT ITEM
══════════════════════════ */
.workout-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.workout-row:last-child { border-bottom: none; }

.workout-icon-wrap {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.workout-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.workout-meta { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

/* ══════════════════════════
   SPLITS
══════════════════════════ */
.splits-box {
  background: var(--bg);
  border-radius: var(--r);
  padding: 14px;
  border: 1.5px solid var(--border);
  margin-top: 4px;
}

/* ══════════════════════════
   INTERVAL BLOCKS
══════════════════════════ */
.int-block {
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 12px;
  border: 1.5px solid;
}
.int-warmup { background: rgba(255,149,0,.06); border-color: rgba(255,149,0,.2); }
.int-main { background: var(--accent-light); border-color: rgba(0,122,255,.2); }
.int-cool { background: var(--green-light); border-color: rgba(52,199,89,.2); }

.int-label { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }

/* ══════════════════════════
   PROGRESS BAR
══════════════════════════ */
.progress-wrap { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .6s cubic-bezier(.4,0,.2,1); }

/* ══════════════════════════
   PLAN DAY
══════════════════════════ */
.plan-day {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 8px;
  transition: border-color .15s;
}
.plan-day:hover { border-color: var(--border2); }
.plan-day.done { border-color: rgba(52,199,89,.4); background: rgba(52,199,89,.03); }
.plan-day.missed { border-color: rgba(255,59,48,.3); background: rgba(255,59,48,.03); }
.plan-day.today-row { border-color: rgba(0,122,255,.5); back
